{% extends "base.html" %}

{% block title %}Morpheus — Capture{% endblock %}

{% block content %}
<div class="quick-capture-container">
  <div class="quick-capture-header">
    <h1 class="capture-title">Morpheus</h1>
    <p class="capture-subtitle">What happened?</p>
  </div>
  
  <form action="/log" method="post" class="capture-form">
    <textarea 
      name="content" 
      class="capture-textarea" 
      placeholder="Solved 2 Leetcode problems. Read CLRS chapter 5." 
      required 
      autofocus
    ></textarea>
    
    <div class="capture-actions">
      <button type="submit" class="btn btn--primary btn-log">
        <span class="btn-icon">📝</span> Log
      </button>
    </div>
  </form>
</div>
{% endblock %}
