<!DOCTYPE html>
<!--
  base.html — Master layout with collapsible sidebar navigation.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Morpheus — Personal Life Tracking Application" />
  <title>{% block title %}Morpheus{% endblock %}</title>

  <!-- Google Fonts — Inter for clean, modern typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Application stylesheet -->
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <!-- ─── Header ──────────────────────────────────────────────── -->
  <header class="site-header">
    <nav class="nav-container">
      <div class="nav-left-group">
        <button class="sidebar-toggle-btn" id="sidebar-toggle-btn" aria-label="Toggle Sidebar">
          ☰
        </button>
        <a href="/" class="nav-logo">
          <span class="logo-icon">🌙</span>
          <span class="logo-text">Morpheus</span>
        </a>
      </div>
      <div class="nav-right">
        <span class="nav-date" id="nav-date"></span>
      </div>
    </nav>
  </header>

  <!-- ─── App Shell (sidebar + content) ───────────────────────── -->
  <div class="app-shell">

    <!-- ─── Sidebar ─────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
      <ul class="sidebar-menu">
        <li>
          <a href="/" class="sidebar-link {% if active_page == 'home' %}active{% endif %}" id="menu-home">
            <span class="menu-icon">🏠</span>
            <span class="menu-text">Home</span>
          </a>
        </li>
        <li>
          <a href="/schedule" class="sidebar-link {% if active_page == 'schedule' %}active{% endif %}" id="menu-schedule">
            <span class="menu-icon">📅</span>
            <span class="menu-text">Schedule</span>
          </a>
        </li>
        <li>
          <a href="/rules" class="sidebar-link {% if active_page == 'rules' %}active{% endif %}" id="menu-rules">
            <span class="menu-icon">✅</span>
            <span class="menu-text">Rules</span>
          </a>
        </li>
        <li>
          <a href="/statistics" class="sidebar-link {% if active_page == 'statistics' %}active{% endif %}" id="menu-statistics">
            <span class="menu-icon">📈</span>
            <span class="menu-text">Statistics</span>
          </a>
        </li>
        <li>
          <a href="/review/daily" class="sidebar-link {% if active_page == 'reviews' %}active{% endif %}" id="menu-reviews">
            <span class="menu-icon">📊</span>
            <span class="menu-text">Reviews</span>
          </a>
        </li>
      </ul>
    </aside>

    <!-- ─── Main Content ──────────────────────────────────────── -->
    <main class="main-content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- ─── Footer ──────────────────────────────────────────────── -->
  <footer class="site-footer">
    <p>&copy; 2026 Morpheus &middot; Personal Life Tracking</p>
  </footer>

  <!-- Sidebar Collapse & Persistence Script -->
  <script>
    // Set current date in navbar
    document.getElementById('nav-date').textContent =
      new Date().toLocaleDateString('en-IN', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });

    // Handle Collapsible Sidebar
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('sidebar-toggle-btn');

    // Retrieve previous state
    const isCollapsed = localStorage.getItem('sidebar-collapsed') === 'true';
    if (isCollapsed) {
      sidebar.classList.add('collapsed');
    }

    toggleBtn.addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
      localStorage.setItem('sidebar-collapsed', sidebar.classList.contains('collapsed'));
    });
  </script>
</body>
</html>
